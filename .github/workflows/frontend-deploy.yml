name: AWS EC2 Deploy (Frontend)

on:
  workflow_dispatch:
    inputs:
      TELEGRAM_BOT_TOKEN:
        description: "Telegram Bot token"
        required: true
        type: string
      MONGO_ROOT_USERNAME:
        description: "MongoDB root username"
        required: true
        type: string
      MONGO_ROOT_PASSWORD:
        description: "MongoDB root password"
        required: true
        type: string

jobs:
  deploy:
    name: Deploy Frontend to EC2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_KEY }}

      - name: Deploy frontend via SSH
        env:
          TELEGRAM_BOT_TOKEN: ${{ inputs.TELEGRAM_BOT_TOKEN }}
          MONGO_ROOT_USERNAME: ${{ inputs.MONGO_ROOT_USERNAME }}
          MONGO_ROOT_PASSWORD: ${{ inputs.MONGO_ROOT_PASSWORD }}
        run: |
          set -e
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
          set -e
          REPO_DIR=~/comp_7940_gp

          # ====================== Install Dependencies (git, docker, docker-compose) ======================
          # Compatible with Amazon Linux 2 and Amazon Linux 2023
          echo "=== Installing required dependencies (git, docker, docker-compose) ==="
          
          # Install git
          sudo dnf install -y git || sudo yum install -y git
          
          # Install and start Docker service
          sudo dnf install -y docker || sudo yum install -y docker
          sudo systemctl enable docker
          sudo systemctl start docker

          # FIX PERMISSION
          sudo usermod -aG docker $USER
          
          # Install latest docker-compose if not installed
          echo "=== Checking docker-compose installation ==="
          if ! command -v docker-compose &> /dev/null; then
            echo "docker-compose not found, installing..."
            sudo curl -L https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m) -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
          else
            echo "docker-compose is already installed, skip installation."
          fi

          sudo mkdir -p /usr/local/libexec/docker/cli-plugins
          sudo mkdir -p /usr/libexec/docker/cli-plugins
          
          if [ ! -f /usr/libexec/docker/cli-plugins/docker-buildx ]; then
              BUILDX_VERSION=$(curl -s https://api.github.com/repos/docker/buildx/releases/latest | grep -oP '"tag_name": "\K[^"]+')
              sudo curl -Lo /usr/libexec/docker/cli-plugins/docker-buildx "https://github.com/docker/buildx/releases/download/${BUILDX_VERSION}/buildx-${BUILDX_VERSION}.linux-amd64"
              sudo chmod +x /usr/libexec/docker/cli-plugins/docker-buildx
          fi
          
          sudo usermod -aG docker $USER
          
          sudo systemctl restart docker
        
          # ==============================================================================================

          if [ ! -d "$REPO_DIR" ]; then
            git clone https://github.com/a757814283/comp_7940_gp "$REPO_DIR"
          fi

          cd "$REPO_DIR"
          git fetch --all
          git checkout -B main origin/main
          git reset --hard origin/main
          git clean -fd

          mkdir -p frontend

          cat > frontend/.env << 'EOT'
          TELEGRAM_BOT_TOKEN=${{ inputs.TELEGRAM_BOT_TOKEN }}
          MONGO_ROOT_USERNAME=${{ inputs.MONGO_ROOT_USERNAME }}
          MONGO_ROOT_PASSWORD=${{ inputs.MONGO_ROOT_PASSWORD }}
          EOT

          # Ensure the shared docker network exists (frontend uses external network `gp-net`)
          sudo docker network create gp-net >/dev/null 2>&1 || true
          
          sudo docker-compose -f frontend/docker-compose.yml down -v
          
          sudo docker-compose -f frontend/docker-compose.yml up -d --build

          EOF
