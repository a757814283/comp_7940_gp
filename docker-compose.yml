services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    command: mongod --auth

  backend-1:
    build:
      context: ./llm-backend
    container_name: backend-1
    restart: unless-stopped
    environment:
      - API_KEY=${API_KEY_1}
      - BASE_URL=${BASE_URL_1}
      - API_VER=${API_VER_1}
      - MODEL=${MODEL_1:-gpt-4o-mini}
      - LLM_NAME=${LLM_NAME_1:-GPT-4o-mini}
      - PORT=8000
    ports:
      - "8001:8000"

  backend-2:
    build:
      context: ./llm-backend
    container_name: backend-2
    restart: unless-stopped
    environment:
      - API_KEY=${API_KEY_2}
      - BASE_URL=${BASE_URL_2}
      - API_VER=${API_VER_2}
      - MODEL=${MODEL_2:-gpt-3.5-turbo}
      - LLM_NAME=${LLM_NAME_2:-GPT-3.5}
      - PORT=8000
    ports:
      - "8002:8000"

  backend-3:
    build:
      context: ./llm-backend
    container_name: backend-3
    restart: unless-stopped
    environment:
      - API_KEY=${API_KEY_3}
      - BASE_URL=${BASE_URL_3}
      - API_VER=${API_VER_3}
      - MODEL=${MODEL_3:-gpt-4.1-mini}
      - LLM_NAME=${LLM_NAME_3:-gpt-4.1-mini}
      - PORT=8000
    ports:
      - "8003:8000"

  telegram-bot:
    build:
      context: ./telegram-bot
    container_name: telegram-bot
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - MONGODB_URI=mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/chatdb?authSource=admin
      - BACKEND_URL_TEMPLATE=http://backend-{id}:8000
      - BACKEND_DISCOVERY_START_ID=1
      - BACKEND_DISCOVERY_LIMIT=20
    depends_on:
      - mongodb

volumes:
  mongo_data:
